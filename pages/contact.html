<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Paropakar Sanstha</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            color: #333;
            min-height: 100vh;
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .topbar a {
            text-decoration: none;
            color: #b22222;
            font-weight: bold;
        }

        .contact-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .info h1 {
            font-size: 32px;
            margin-bottom: 12px;
            color: #b22222;
        }

        .info p {
            margin-bottom: 16px;
            line-height: 1.6;
            color: #555;
        }

        .details {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .details div {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #444;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        form input,
        form textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }

        form textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            width: fit-content;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #b22222;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #8f1919;
        }

        @media (max-width: 768px) {
            .contact-card {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="topbar">
            <h2>Contact Us</h2>
            <a href="../index.html">← Back to Home</a>
        </div>

        <div class="contact-card">
            <div class="info">
                <h1>Paropakar Sanstha</h1>
                <p>We are here to support senior citizens and families with care, guidance, and assistance. Reach out to
                    us for any questions or support requests.</p>

                <div class="details">
                    <div><i class="fa-solid fa-location-dot"></i> <span>Birtamode, Nepal</span></div>
                    <div><i class="fa-solid fa-phone"></i> <span>+977 98455226</span></div>
                    <div><i class="fa-solid fa-envelope"></i> <span>paropkar</span></div>
                </div>
            </div>

            <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="e3a20ef6-8d07-4634-ad1c-518a09204441">
                <input type="text" placeholder="name" name="name" required>
                <input type="email" placeholder="email" name="email" required>
                <textarea name="message" placeholder="message" required></textarea>
                <button type="submit">Submit</button>
            </form>
        </div>

        <div style="margin-top: 24px; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.12);">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d7132.732744082204!2d87.98944342750853!3d26.636749607570408!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39e5bb82ddd53e75%3A0x3573d0379745b115!2sParopakar%20Tatha%20Anusandhan%20Kendra!5e0!3m2!1sen!2snp!4v1783149695167!5m2!1sen!2snp%22%20width=%22600%22%20height=%22450%22%20style=%22border:0;%22%20allowfullscreen=%22%22%20loading=%22lazy%22%20referrerpolicy=%22strict-origin-when-cross-origin"
                width="100%" height="360" style="border:0;" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                title="Paropakar Sanstha location">
            </iframe>
        </div>
    </div>
    <script>
        const form = document.getElementById('form');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(form);
            formData.append("access_key", "e3a20ef6-8d07-4634-ad1c-518a09204441");

            const originalText = submitBtn.textContent;

            submitBtn.textContent = "Sending...";
            submitBtn.disabled = true;

            try {
                const response = await fetch("https://api.web3forms.com/submit", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    alert("Success! Your message has been sent.");
                    form.reset();
                } else {
                    alert("Error: " + data.message);
                }

            } catch (error) {
                alert("Something went wrong. Please try again.");
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>


</html>
